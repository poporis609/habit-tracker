<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" fill="none" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1200" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f0c29"/>
      <stop offset="0.5" stop-color="#302b63"/>
      <stop offset="1" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#34d399"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="480" rx="24" fill="url(#page)"/>
  <circle cx="180" cy="120" r="160" fill="#8b5cf6" opacity="0.18" filter="url(#glow)"/>
  <circle cx="1050" cy="400" r="140" fill="#ec4899" opacity="0.15" filter="url(#glow)"/>

  <!-- Left: brand text -->
  <g transform="translate(80, 120)">
    <g transform="translate(0,0)">
      <rect width="64" height="64" rx="16" fill="url(#brand)"/>
      <path d="M32 50V30" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M32 33C32 25 26 19 16 19c0 8 6 14 16 14Z" fill="url(#leaf)"/>
      <path d="M32 29c0-7 6-12 15-12 0 7-6 12-15 12Z" fill="url(#leaf)"/>
      <circle cx="32" cy="52" r="2.5" fill="#fff"/>
    </g>
    <text x="84" y="30" fill="#ffffff" font-size="48" font-weight="800">Groo</text>
    <text x="86" y="62" fill="#c4b5fd" font-size="18" font-weight="600" letter-spacing="2">AI 습관 트래커</text>

    <text x="0" y="135" fill="#ffffff" font-size="30" font-weight="700">습관·일기·기분을 기록하고,</text>
    <text x="0" y="175" fill="#ffffff" font-size="30" font-weight="700">AI 코치가 동기를 부여합니다.</text>

    <g transform="translate(0, 215)" font-size="17" font-weight="600">
      <rect width="150" height="36" rx="18" fill="#8b5cf6" opacity="0.25"/>
      <text x="20" y="24" fill="#ddd6fe">🤖 AI 코치</text>
      <rect x="166" width="170" height="36" rx="18" fill="#ec4899" opacity="0.22"/>
      <text x="186" y="24" fill="#fbcfe8">📈 주간 리포트</text>
      <rect y="48" width="150" height="36" rx="18" fill="#10b981" opacity="0.22"/>
      <text x="20" y="72" fill="#a7f3d0">🎤 음성 입력</text>
      <rect x="166" y="48" width="170" height="36" rx="18" fill="#f59e0b" opacity="0.20"/>
      <text x="186" y="72" fill="#fde68a">🪄 AI 습관 추천</text>
    </g>

    <text x="0" y="330" fill="#94a3b8" font-size="15" font-weight="500">React 19 · Azure Static Web Apps · GitHub Models · 운영비 $0</text>
  </g>

  <!-- Right: phone mock -->
  <g transform="translate(800, 60)">
    <rect width="320" height="360" rx="32" fill="#16132e" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1.5"/>
    <!-- header -->
    <text x="28" y="52" fill="#c4b5fd" font-size="11" font-weight="700" letter-spacing="2">GROO · AI 습관 트래커</text>
    <text x="28" y="84" fill="#ffffff" font-size="26" font-weight="800">오늘의 <tspan fill="#c084fc">습관</tspan></text>

    <!-- progress card -->
    <g transform="translate(28, 104)">
      <rect width="264" height="84" rx="18" fill="#ffffff" opacity="0.06"/>
      <circle cx="46" cy="42" r="30" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="7"/>
      <circle cx="46" cy="42" r="30" fill="none" stroke="url(#brand)" stroke-width="7" stroke-linecap="round"
        stroke-dasharray="188" stroke-dashoffset="56" transform="rotate(-90 46 42)"/>
      <text x="46" y="48" fill="#ffffff" font-size="18" font-weight="800" text-anchor="middle">70%</text>
      <text x="96" y="36" fill="#ffffff" font-size="15" font-weight="700">잘 하고 있어요!</text>
      <text x="96" y="58" fill="#94a3b8" font-size="12">2개 완료 · 1개 남음</text>
    </g>

    <!-- habit rows -->
    <g transform="translate(28, 202)">
      <rect width="264" height="44" rx="14" fill="#ffffff" opacity="0.05"/>
      <rect x="12" y="9" width="26" height="26" rx="8" fill="#3b82f6"/>
      <text x="20" y="28" font-size="14">💧</text>
      <text x="50" y="29" fill="#ffffff" font-size="13" font-weight="700">물 2L 마시기</text>
      <circle cx="244" cy="22" r="11" fill="url(#brand)"/>
      <path d="M239 22l4 4 6-7" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(28, 252)">
      <rect width="264" height="44" rx="14" fill="#ffffff" opacity="0.05"/>
      <rect x="12" y="9" width="26" height="26" rx="8" fill="#10b981"/>
      <text x="20" y="28" font-size="14">🏃</text>
      <text x="50" y="29" fill="#ffffff" font-size="13" font-weight="700">30분 운동</text>
      <circle cx="244" cy="22" r="11" fill="url(#brand)"/>
      <path d="M239 22l4 4 6-7" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(28, 302)">
      <rect width="264" height="44" rx="14" fill="#ffffff" opacity="0.05"/>
      <rect x="12" y="9" width="26" height="26" rx="8" fill="#8b5cf6"/>
      <text x="20" y="28" font-size="14">📚</text>
      <text x="50" y="29" fill="#ffffff" font-size="13" font-weight="700">책 20분 읽기</text>
      <circle cx="244" cy="22" r="11" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2"/>
    </g>
  </g>
</svg>
